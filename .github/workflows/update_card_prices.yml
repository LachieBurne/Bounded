name: Update Card Prices

on:
  schedule:
    # Runs at 00:00 UTC on Mon, Wed, Fri (Every 2-3 days)
    # This keeps you roughly around 450 requests/month (Safe zone)
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: # Allows you to run it manually from GitHub button if needed

jobs:
  update-prices:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install libraries
      run: pip install requests

    - name: Run Updater Script
      env:
        JUSTTCG_API_KEY: ${{ secrets.JUSTTCG_API_KEY }}
      run: python justTCG_price_api.py

    - name: Commit and Push
      run: |
        git config --global user.name "PriceBot"
        git config --global user.email "bot@riftbinder.com"
        git add prices.json
        git commit -m "Update prices [Automated]" || exit 0
        git push
